<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Patient</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg">

        <div class="card-header bg-primary text-white">
            <h3>Add Patient Record</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" name="dob" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Glucose</label>
                    <input type="number" step="0.01" name="glucose" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Haemoglobin</label>
                    <input type="number" step="0.01" name="haemoglobin" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Cholesterol</label>
                    <input type="number" step="0.01" name="cholesterol" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-success">
                    Save Patient
                </button>

                <a href="/" class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
