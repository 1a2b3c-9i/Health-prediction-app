<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning">
            <h3>Edit Patient</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Name</label>
                    <input type="text"
                           name="name"
                           value="{{ patient.full_name }}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>DOB</label>
                    <input type="date"
                           name="dob"
                           value="{{ patient.dob }}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email"
                           name="email"
                           value="{{ patient.email }}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Glucose</label>
                    <input type="number"
                           name="glucose"
                           value="{{ patient.glucose }}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Haemoglobin</label>
                    <input type="number"
                           name="haemoglobin"
                           value="{{ patient.haemoglobin }}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>Cholesterol</label>
                    <input type="number"
                           name="cholesterol"
                           value="{{ patient.cholesterol }}"
                           class="form-control"
                           required>
                </div>

                <button type="submit" class="btn btn-success">
                    Update Patient
                </button>

                <a href="/" class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
